<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Modern Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(to right, #6e7f80, #d6d9d9);
            font-family: 'Arial', sans-serif;
        }
        .calculator {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
        .display {
            width: 100%;
            height: 50px;
            background: #fff;
            border-radius: 10px;
            border: none;
            text-align: right;
            font-size: 24px;
            padding: 10px;
        }
        .button {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 10px;
            margin: 5px;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" class="display" id="display" disabled />
        <div>
            <button class="button" onclick="clearDisplay()">C</button>
            <button class="button" onclick="appendToDisplay('1')">1</button>
            <button class="button" onclick="appendToDisplay('2')">2</button>
            <button class="button" onclick="appendToDisplay('3')">3</button>
            <button class="button" onclick="setOperation('+')">+</button>
        </div>
        <div>
            <button class="button" onclick="appendToDisplay('4')">4</button>
            <button class="button" onclick="appendToDisplay('5')">5</button>
            <button class="button" onclick="appendToDisplay('6')">6</button>
            <button class="button" onclick="setOperation('-')">-</button>
        </div>
        <div>
            <button class="button" onclick="appendToDisplay('7')">7</button>
            <button class="button" onclick="appendToDisplay('8')">8</button>
            <button class="button" onclick="appendToDisplay('9')">9</button>
            <button class="button" onclick="setOperation('*')">*</button>
        </div>
        <div>
            <button class="button" onclick="appendToDisplay('0')">0</button>
            <button class="button" onclick="calculateResult()">=</button>
            <button class="button" onclick="setOperation('/')">/</button>
            <button class="button" onclick="calculateHistory()">History</button>
        </div>
        <div id="history" style="margin-top: 20px;"></div>
    </div>
    <script>
        let display = document.getElementById('display');
        let currentOperation = '';
        let firstOperand = '';
        let calculationHistory = [];

        function appendToDisplay(value) {
            display.value += value;
        }

        function clearDisplay() {
            display.value = '';
            currentOperation = '';
            firstOperand = '';
        }

        function setOperation(operator) {
            if (currentOperation) return;
            firstOperand = display.value;
            currentOperation = operator;
            display.value = '';
        }

        function calculateResult() {
            let secondOperand = display.value;
            let result;
            switch (currentOperation) {
                case '+':
                    result = parseFloat(firstOperand) + parseFloat(secondOperand);
                    break;
                case '-':
                    result = parseFloat(firstOperand) - parseFloat(secondOperand);
                    break;
                case '*':
                    result = parseFloat(firstOperand) * parseFloat(secondOperand);
                    break;
                case '/':
                    result = parseFloat(firstOperand) / parseFloat(secondOperand);
                    break;
            }
            calculationHistory.push(`${firstOperand} ${currentOperation} ${secondOperand} = ${result}`);
            display.value = result;
            currentOperation = '';
        }

        function calculateHistory() {
            let historyDisplay = document.getElementById('history');
            historyDisplay.innerHTML = calculationHistory.join('<br>');
        }

        window.addEventListener('keydown', (event) => {
            if (!isNaN(event.key) || ['+', '-', '*', '/'].includes(event.key)) {
                appendToDisplay(event.key);
            } else if (event.key === 'Enter') {
                calculateResult();
            } else if (event.key === 'Escape') {
                clearDisplay();
            }
        });
    </script>
</body>
</html>
